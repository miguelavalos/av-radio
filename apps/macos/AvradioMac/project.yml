name: AvradioMac
options:
  bundleIdPrefix: com.avalsys
  deploymentTarget:
    macOS: "14.0"
targets:
  AvradioMac:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleDisplayName: $(AVRADIO_DISPLAY_NAME)
        AVAPPS_API_BASE_URL: $(AVAPPS_API_BASE_URL)
        AVRADIO_ACCOUNT_MANAGEMENT_URL: $(AVRADIO_ACCOUNT_MANAGEMENT_URL)
        LSApplicationCategoryType: public.app-category.music
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    sources:
      - path: Sources
      - path: ../../../shared/apple
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(AVRADIO_BUNDLE_IDENTIFIER)"
        PRODUCT_NAME: AV Radio
        PRODUCT_MODULE_NAME: AvradioMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.10
        CODE_SIGNING_ALLOWED: NO

  AvradioMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: AvradioMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: AvradioMacTests
        PRODUCT_BUNDLE_IDENTIFIER: com.avalsys.avradio.mac.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AV Radio.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AV Radio"

schemes:
  AvradioMac:
    build:
      targets:
        AvradioMac: all
    run:
      config: Debug
      executable: AvradioMac
    test:
      config: Debug
      targets:
        - AvradioMacTests
    analyze:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
    management:
      shared: true
