name: AvradioMac
options:
  bundleIdPrefix: com.avalsys
  deploymentTarget:
    macOS: "14.0"
targets:
  AvradioMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avalsys.avradio.mac
        PRODUCT_NAME: AvradioMac
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_CFBundleDisplayName: AV Radio Mac
        CODE_SIGNING_ALLOWED: NO
