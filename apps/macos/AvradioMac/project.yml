name: AvradioMac
options:
  bundleIdPrefix: com.avalsys
  deploymentTarget:
    macOS: "14.0"
targets:
  AvradioMac:
    type: application
    platform: macOS
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleDisplayName: AV Radio
        LSApplicationCategoryType: public.app-category.music
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    sources:
      - path: Sources
      - path: Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avalsys.avradio.mac
        PRODUCT_NAME: AV Radio
        SWIFT_VERSION: 5.10
        CODE_SIGNING_ALLOWED: NO
